<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Nexo Pride</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-black text-white">

<!-- SIDEBAR -->
<div id="sidebar" class="fixed top-0 left-0 z-50 w-64 h-full bg-zinc-900 p-5 border-r border-zinc-800 transform -translate-x-full transition duration-300">

  <!-- HEADER SIDEBAR -->
  <div class="flex justify-between items-center mb-10">
    <h1 class="text-xl font-bold text-red-500">NEXO</h1>

    <!-- TOMBOL CLOSE -->
    <button onclick="toggleSidebar()" class="text-xl">
      ✖
    </button>
  </div>

  <ul class="space-y-4 text-sm">
    <li class="text-red-400">🏠 Dashboard</li>
    <li class="hover:text-red-400 cursor-pointer">📄 Dokumentasi</li>
    <li class="hover:text-red-400 cursor-pointer">🔑 API Key</li>
    <li class="hover:text-red-400 cursor-pointer">⚙️ Settings</li>
  </ul>

</div>

<!-- MAIN -->
<div class="p-6 max-w-6xl mx-auto">

  <!-- TOP -->
  <div class="flex justify-between items-center mb-8">

  <button onclick="toggleSidebar()" class="md:hidden text-2xl">
    ☰
  </button>

  <h2 class="text-2xl font-bold">Dashboard</h2>
  <span class="text-gray-400 text-sm">Welcome To Nexo Pride</span>

</div>
    <h2 class="text-2xl font-bold">Dashboard</h2>
    <span class="text-gray-400 text-sm">Welcome To Nexo Pride</span>
  </div>

  <!-- STATS -->
  <div class="grid md:grid-cols-3 gap-6">

    <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 shadow-lg hover:scale-105 transition">
      <p class="text-gray-400 text-sm">👥 Member</p>
      <h2 class="text-3xl font-bold mt-2">60+</h2>
    </div>

    <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 shadow-lg hover:scale-105 transition">
      <p class="text-gray-400 text-sm">⚡ Total Babu</p>
      <h2 class="text-3xl font-bold mt-2">120+</h2>
    </div>

    <div class="bg-zinc-900 p-6 rounded-2xl border border-zinc-800 shadow-lg hover:scale-105 transition">
      <p class="text-gray-400 text-sm">🔥 Pro Player</p>
      <h2 class="text-3xl font-bold mt-2">4</h2>
    </div>

  </div>

</div>

<script>
function toggleSidebar() {
  const sidebar = document.getElementById("sidebar");
  sidebar.classList.toggle("-translate-x-full");
}
</script>

</body>
</html>
